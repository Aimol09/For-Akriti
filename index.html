<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirf Tere Liye... ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0104; 
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0b0104;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .start-btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.4);
        }

        .heart-fall {
            position: absolute;
            color: #ff4757;
            font-size: 20px;
            animation: fall linear infinite;
            top: -20px;
            z-index: 1;
            user-select: none;
            opacity: 0.4;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) translateX(30px) rotate(360deg);
            }
        }

        .container {
            background: rgba(20, 5, 10, 0.88);
            padding: 35px 25px;
            border-radius: 25px;
            box-shadow: 0 20px 40px rgba(255, 71, 87, 0.2);
            max-width: 460px;
            width: 88%;
            margin: auto;
            z-index: 10;
            border: 1px solid rgba(255, 71, 87, 0.35);
            text-align: center;
            backdrop-filter: blur(15px);
            display: none; 
        }

        .love-letter {
            font-size: 16px;
            line-height: 1.8;
            color: #ffe3e8;
            margin-bottom: 25px;
            min-height: 240px; 
            text-align: left;
            white-space: pre-line;
            font-weight: 400;
            padding: 0 10px;
        }

        h2 {
            color: #ff4757;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 15px;
            text-shadow: 0 0 15px rgba(255, 71, 87, 0.6);
        }

        .btn-container {
            position: relative;
            height: 70px;
            margin-top: 15px;
        }

        button.action-btn {
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
        }

        #yesBtn {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            left: 25px;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }

        #noBtn {
            background-color: #2f3542;
            color: #ced6e0;
            right: 25px;
            z-index: 999;
        }

        #yt-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
        }
    </style>
</head>
<body>

<!-- YouTube API Script -->
<script src="https://www.youtube.com/iframe_api"></script>

<!-- Start Screen -->
<div id="start-screen">
    <button class="start-btn" onclick="startEverything()">Open Your Note... 🎵❤️</button>
</div>

<!-- Chhupa hua YouTube Player tumhaari Shorts ID ke sath -->
<div id="yt-player"></div>

<div class="container" id="main-container">
    <h2>Suno Akriti... ❤️</h2>
    <div class="love-letter" id="typewriter"></div>

    <div class="btn-container">
        <button id="yesBtn" class="action-btn" onclick="confessLove()">Aa jao, Hug Kar Lo! 🫂❤️</button>
        <button id="noBtn" class="action-btn" onmouseover="moveButton()" onclick="moveButton()">No</button>
    </div>
</div>

<script>
const textToType = "Akriti, sach batau na... tumhara woh handwritten note dekh kar mera dil ekdum khush ho gaya. \n\nMujhe badi-badi baatein likhna toh nahi aata, par jab tumne likha na ki main perfect nahi hoon fir bhi tumhare liye sahi hoon, toh mera saara darr hi khatam ho gaya.\n\nTum din bhar hospital mein kitna bhi thak jao, bas ek baar muskura kar baat kar leti ho toh mera din ban jata hai. Mann karta hai bas abhi tumhare paas aaoon aur tumhe ek dum tight wali jhappi de doon, jahan tum aakhon band karke apni saari thakan bhool jao.\n\nTum jaisi bhi ho, mere liye sabse best ho. Toh batao, humesha mere sath rahongi na?";

let index = 0;
let player;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
        height: '1',
        width: '1',
        videoId: 'Pnmywg_H9bA', // Nayi shorts wali ID fit kar di hai
        playerVars: {
            'autoplay': 0,
            'controls': 0,
            'loop': 1,
            'playlist': 'Pnmywg_H9bA'
        }
    });
}

function startEverything() {
    if (player && player.playVideo) {
        player.playVideo();
    }

    document.getElementById("start-screen").style.display = "none";
    document.getElementById("main-container").style.display = "block";

    typeEffect();
    setInterval(createHeart, 250);
}

function typeEffect() {
    if (index < textToType.length) {
        document.getElementById("typewriter").innerHTML += textToType.charAt(index);
        index++;
        setTimeout(typeEffect, 45); 
    }
}

function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart-fall');
    heart.innerHTML = '❤️';
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = Math.random() * 3 + 2 + "s";
    heart.style.fontSize = Math.random() * 15 + 12 + "px";
    
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 5000);
}

function moveButton() {
    const btn = document.getElementById('noBtn');
    const x = Math.random() * (window.innerWidth - btn.offsetWidth - 50);
    const y = Math.random() * (window.innerHeight - btn.offsetHeight - 50);
    
    btn.style.position = 'fixed';
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
}

function confessLove() {
    alert('Chalo ab jaldi se muskurao aur chupchaap jaakar so jao. Khayal rakhna apna! ❤️ 🫂');
}
</script>

</body>
</html>
