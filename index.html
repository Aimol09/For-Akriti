<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sirf Tere Liye... ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Beautiful bright romantic gradient background */
            background: linear-gradient(135deg, #ffeef2 0%, #ffd3dc 50%, #fbc2eb 100%); 
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #ffeef2, #ffd3dc);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .start-btn {
            padding: 16px 35px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4);
            transition: transform 0.2s;
        }

        .start-btn:hover {
            transform: scale(1.05);
        }

        /* High-quality falling hearts */
        .heart-fall {
            position: absolute;
            font-size: 24px;
            animation: fall linear infinite;
            top: -30px;
            z-index: 1;
            user-select: none;
            filter: drop-shadow(0px 3px 5px rgba(0,0,0,0.1));
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) translateX(40px) rotate(360deg);
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.92);
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(214, 48, 49, 0.15);
            max-width: 460px;
            width: 88%;
            margin: auto;
            z-index: 10;
            border: 2px solid #ffb3c1;
            text-align: center;
            backdrop-filter: blur(10px);
            display: none; 
        }

        /* Bold & Premium Letter Text */
        .love-letter {
            font-size: 18px; 
            line-height: 1.8;
            color: #2d3436;
            margin-bottom: 25px;
            min-height: 260px; 
            text-align: left;
            white-space: pre-line;
            font-weight: 700; 
            padding: 0 10px;
            text-shadow: 0.5px 0.5px 0px rgba(0,0,0,0.05);
        }

        h2 {
            color: #d63031;
            font-size: 26px;
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 800;
        }

        .btn-container {
            position: relative;
            height: 70px;
            margin-top: 15px;
        }

        button.action-btn {
            padding: 14px 25px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: absolute;
        }

        #yesBtn {
            background: linear-gradient(45deg, #ff4757, #ff6b81);
            color: white;
            left: 5px;
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }

        #yesBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 71, 87, 0.6);
        }

        #noBtn {
            background-color: #747d8c;
            color: white;
            right: 5px;
            z-index: 999;
            box-shadow: 0 6px 15px rgba(116, 125, 140, 0.3);
        }

        #yt-player {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
        }
    </style>
</head>
<body>

<script src="https://www.youtube.com/iframe_api"></script>

<div id="start-screen">
    <button class="start-btn" onclick="startEverything()">Open Your Note... 🎵❤️</button>
</div>

<div id="yt-player"></div>

<div class="container" id="main-container">
    <h2>Suno Akriti... ❤️</h2>
    <div class="love-letter" id="typewriter"></div>

    <div class="btn-container">
        <button id="yesBtn" class="action-btn" onclick="confessLove()">Ghar se aungi to milenge tumhari kassam! 🫂❤️</button>
        <button id="noBtn" class="action-btn" onmouseover="moveButton()" onclick="moveButton()">2028 me milenge</button>
    </div>
</div>

<script>
const textToType = "Akriti, Bahot khas ho tum, \n\nLafzo me batana mumkin nhii mere dil ke kitne pass ho tum. \n\nApna milna ittefaq he ya kuch aur, me nhi janta par ab mera ek hasin khwab ho tum. \n\nSach kahu to chand ho tum. Tumhe paa lena mtlb, chand ko chhu lena... in lafzo ke ehsaas bahot khas hai kyuki sath ho tum.\n\nI love you forever❤️";

let index = 0;
let player;

function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
        height: '1',
        width: '1',
        videoId: 'tDBUEpcQ4hY', // Teri final song ID perfectly set hai
        playerVars: {
            'autoplay': 0,
            'controls': 0,
            'loop': 1,
            'playlist': 'tDBUEpcQ4hY'
        }
    });
}

function startEverything() {
    if (player && player.playVideo) {
        player.playVideo();
    }

    document.getElementById("start-screen").style.display = "none";
    document.getElementById("main-container").style.display = "block";

    typeEffect();
    setInterval(createHeart, 200); 
}

function typeEffect() {
    if (index < textToType.length) {
        document.getElementById("typewriter").innerHTML += textToType.charAt(index);
        index++;
        setTimeout(typeEffect, 45); 
    }
}

function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart-fall');
    
    const heartTypes = ['❤️', '💖', '💝', '💕'];
    heart.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
    
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = Math.random() * 3 + 2 + "s";
    heart.style.fontSize = Math.random() * 15 + 15 + "px"; 
    
    document.body.appendChild(heart);
    setTimeout(() => { heart.remove(); }, 5000);
}

function moveButton() {
    const btn = document.getElementById('noBtn');
    const x = Math.random() * (window.innerWidth - btn.offsetWidth - 50);
    const y = Math.random() * (window.innerHeight - btn.offsetHeight - 50);
    
    btn.style.position = 'fixed';
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
}

function confessLove() {
    alert('Thankyou for choosing me and being a part of my life. love you jldi se ek hug karo ❤️ 🫂');
}
</script>

</body>
</html>
