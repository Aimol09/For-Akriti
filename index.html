<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person ❤️</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            background-color: #fff5f5;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-content: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            max-width: 400px;
            margin: auto;
        }
        h2 {
            color: #d63031;
            font-size: 24px;
            margin-bottom: 30px;
        }
        .btn-container {
            position: relative;
            height: 100px;
        }
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #yesBtn {
            background-color: #2ecc71;
            color: white;
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3);
        }
        #noBtn {
            background-color: #e74c3c;
            color: white;
            position: absolute;
            left: 220px;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Akriti, kya aap humesha mere sath rahongi? ❤️</h2>
    <div class="btn-container">
        <button id="yesBtn" onclick="confessLove()">Yes</button>
        <button id="noBtn" onmouseover="moveButton()" onclick="moveButton()">No</button>
    </div>
</div>

<script>
function moveButton() {
    var btn = document.getElementById('noBtn');
    // Button ko screen ke andar hi rakhne ke liye settings
    var x = Math.random() * (window.innerWidth - btn.offsetWidth - 40);
    var y = Math.random() * (window.innerHeight - btn.offsetHeight - 40);
    
    // Agar coordinates container ke andar aa rahe hain toh thoda shift kar dena
    if(x < (window.innerWidth/2 + 150) && x > (window.innerWidth/2 - 150)) {
        x += 150;
    }
    
    btn.style.left = x + 'px';
    btn.style.top = y + 'px';
}

function confessLove() {
    alert('I love you too, my favorite person! 🧿🫂 Chalo ab chupchaap khana khao!');
}
</script>

</body>
</html>
